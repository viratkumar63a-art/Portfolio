<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Contact | Virat Kumar Jha</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

     <style>
          :root {
               --primary: #00dbde;
               --secondary: #fc00ff;
          }

          body {
               background: linear-gradient(135deg, #0f172a, #1e293b);
               color: white;
               font-family: Segoe UI;
               overflow-x: hidden;
          }

          /* Glow */
          .glow {
               position: fixed;
               width: 450px;
               height: 450px;
               background: var(--primary);
               filter: blur(150px);
               opacity: 0.15;
               top: 120px;
               left: 80px;
               z-index: -1;
          }

          /* Navbar */
          .navbar {
               background: rgba(255, 255, 255, 0.08);
               backdrop-filter: blur(15px);
               border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          }

          .navbar-brand,
          .nav-link {
               color: white !important;
          }

          .nav-link:hover {
               color: var(--primary) !important;
          }

          /* Hero */
          .hero {
               padding: 120px 0 40px;
               text-align: center;
          }

          .hero h1 {
               font-size: 4rem;
               font-weight: 800;
               background: linear-gradient(90deg, var(--primary), var(--secondary));
               -webkit-background-clip: text;
               -webkit-text-fill-color: transparent;
          }

          .hero p {
               color: #cbd5e1;
          }

          /* Contact Card */
          .contact-card {
               background: rgba(255, 255, 255, 0.08);
               backdrop-filter: blur(15px);
               border-radius: 25px;
               border: 1px solid rgba(255, 255, 255, 0.1);
               padding: 40px;
               transform-style: preserve-3d;
               transition: 0.4s;
          }

          .contact-card:hover {
               transform:
                    perspective(1200px) rotateY(5deg) rotateX(5deg) translateY(-10px);
               box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
          }

          /* Inputs */
          .form-control {
               background: rgba(255, 255, 255, 0.05);
               border: 1px solid rgba(255, 255, 255, 0.1);
               color: white;
               border-radius: 15px;
               padding: 12px;
          }

          .form-control:focus {
               background: rgba(255, 255, 255, 0.08);
               border-color: var(--primary);
               box-shadow: none;
               color: white;
          }

          /* Button */
          .btn-custom {
               background: linear-gradient(135deg, var(--primary), var(--secondary));
               border: none;
               color: white;
               padding: 12px 25px;
               border-radius: 50px;
               font-weight: 600;
               transition: 0.3s;
          }

          .btn-custom:hover {
               transform: translateY(-5px);
               box-shadow: 0 15px 30px rgba(252, 0, 255, 0.4);
               color: white;
          }

          /* Contact Info */
          .info-box {
               background: rgba(255, 255, 255, 0.05);
               padding: 25px;
               border-radius: 20px;
               margin-bottom: 20px;
               transition: 0.3s;
          }

          .info-box:hover {
               transform: translateY(-8px);
               background: rgba(255, 255, 255, 0.08);
          }

          .icon-box {
               width: 50px;
               height: 50px;
               border-radius: 50%;
               background: linear-gradient(135deg, var(--primary), var(--secondary));
               display: flex;
               align-items: center;
               justify-content: center;
               margin-bottom: 10px;
          }

          /* Section */
          .section {
               padding: 60px 0;
          }

          footer {
               text-align: center;
               padding: 30px;
               margin-top: 60px;
               background: rgba(255, 255, 255, 0.05);
          }
     </style>
</head>

<body>

     <div class="glow"></div>

     <!-- Navbar -->
     <nav class="navbar navbar-expand-lg fixed-top">
          <div class="container">

               <a class="navbar-brand fw-bold" href="index.html">
                    VIRAT KUMAR
               </a>

               <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu"></button>

               <div class="collapse navbar-collapse" id="menu">

                    <ul class="navbar-nav ms-auto">

                         <li class="nav-item">
                              <a class="nav-link" href="index.html">Home</a>
                         </li>

                         <li class="nav-item">
                              <a class="nav-link" href="blog.html">Blog</a>
                         </li>

                         <li class="nav-item">
                              <a class="nav-link" href="page.html">Page</a>
                         </li>

                         <li class="nav-item">
                              <a class="nav-link active" href="contact.html">Contact</a>
                         </li>

                    </ul>

               </div>
          </div>
     </nav>

     <!-- Hero -->
     <section class="hero">
          <div class="container">
               <h1>Contact Me</h1>
               <p>Let's build something amazing together</p>
          </div>
     </section>

     <!-- Contact Section -->
     <section class="section">
          <div class="container">

               <div class="row g-4">

                    <!-- Contact Form -->
                    <div class="col-lg-7">
                         <div class="contact-card">

                              <h3 class="mb-4">Send Message</h3>

                              <form>

                                   <div class="mb-3">
                                        <input type="text" class="form-control" placeholder="Your Name">
                                   </div>

                                   <div class="mb-3">
                                        <input type="email" class="form-control" placeholder="Your Email">
                                   </div>

                                   <div class="mb-3">
                                        <input type="text" class="form-control" placeholder="Subject">
                                   </div>

                                   <div class="mb-3">
                                        <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
                                   </div>

                                   <button type="submit" class="btn btn-custom">
                                        Send Message
                                   </button>

                              </form>

                         </div>
                    </div>

                    <!-- Contact Info -->
                    <div class="col-lg-5">

                         <div class="info-box">
                              <div class="icon-box">
                                   <i class="fa-solid fa-envelope"></i>
                              </div>
                              <h5>Email</h5>
                              <p>Viratkumar63a@gmail.com</p>
                         </div>

                         <div class="info-box">
                              <div class="icon-box">
                                   <i class="fa-solid fa-phone"></i>
                              </div>
                              <h5>Phone</h5>
                              <p>+91 9334329901</p>
                         </div>

                         <div class="info-box">
                              <div class="icon-box">
                                   <i class="fa-solid fa-location-dot"></i>
                              </div>
                              <h5>Location</h5>
                              <p>Bihar, India</p>
                         </div>

                    </div>

               </div>

          </div>
     </section>

     <!-- Footer -->
     <footer>
          <p>© 2026 Virat Kumar | Contact Page</p>
     </footer>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
