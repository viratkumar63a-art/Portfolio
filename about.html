<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>3D About Page</title>

     <!-- Bootstrap 5 -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <style>
          body {
               background: radial-gradient(circle at top, #1e3c72, #2a5298);
               height: 100vh;
               display: flex;
               align-items: center;
               justify-content: center;
               overflow: hidden;
               color: white;
          }

          .scene {
               perspective: 1000px;
          }

          .card-3d {
               width: 350px;
               padding: 25px;
               border-radius: 20px;
               background: rgba(255, 255, 255, 0.1);
               backdrop-filter: blur(12px);
               box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
               transform-style: preserve-3d;
               transition: transform 0.1s ease;
          }

          .card-3d h2 {
               transform: translateZ(40px);
          }

          .card-3d p {
               transform: translateZ(30px);
          }

          .badge-custom {
               transform: translateZ(50px);
          }

          .avatar {
               width: 90px;
               height: 90px;
               border-radius: 50%;
               object-fit: cover;
               border: 3px solid white;
               transform: translateZ(60px);
          }
     </style>
</head>

<body>

     <div class="scene">
          <div class="card-3d text-center" id="card">

               <!-- <img src="https://i.pravatar.cc/150?img=12" class="avatar mb-3" alt="avatar"> -->
               <img src="virat.png.png" class="avatar mb-3" alt="avatar">
               <h2 class="fw-bold">About Me</h2>

               <p class="mt-2">
                    I am a creative developer who builds modern web experiences using
                    HTML, CSS, JavaScript and Bootstrap.
               </p>

               <span class="badge bg-light text-dark badge-custom">
                    Web Developer
               </span>

               <div class="mt-3">
                    <a href="contact.html" class="btn btn-outline-light btn-sm">
                         Contact
                    </a>
                    <a href="home.html" class="btn btn-3d btn-light btn-sm">
                         Home
                    </a>
               </div>

          </div>
     </div>

     <script>
          const card = document.getElementById("card");

          document.addEventListener("mousemove", (e) => {
               const x = (window.innerWidth / 2 - e.pageX) / 20;
               const y = (window.innerHeight / 2 - e.pageY) / 20;

               card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
          });

          document.addEventListener("mouseleave", () => {
               card.style.transform = "rotateY(0deg) rotateX(0deg)";
          });
     </script>

</body>

</html>
